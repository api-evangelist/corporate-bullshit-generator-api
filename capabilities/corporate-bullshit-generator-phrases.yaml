naftiko: 1.0.0-alpha2
info:
  label: Corporate Bullshit Generator API — Phrases
  description: 'Corporate Bullshit Generator API — Phrases. 1 operations. Lead operation: Generate a corporate jargon phrase.
    Self-contained Naftiko capability covering one Corporate Bullshit Generator Api business surface.'
  tags:
  - Corporate Bullshit Generator Api
  - Phrases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CORPORATE_BULLSHIT_GENERATOR_API_API_KEY: CORPORATE_BULLSHIT_GENERATOR_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: corporate-bullshit-generator-phrases
    baseUri: https://corporatebs-generator.sameerkumar.website
    description: Corporate Bullshit Generator API — Phrases business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: getcorporatephrase
        method: GET
        description: Generate a corporate jargon phrase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: corporate-bullshit-generator-phrases-rest
    port: 8080
    description: REST adapter for Corporate Bullshit Generator API — Phrases. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: getcorporatephrase
        description: Generate a corporate jargon phrase
        call: corporate-bullshit-generator-phrases.getcorporatephrase
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: corporate-bullshit-generator-phrases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Corporate Bullshit Generator API — Phrases. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: generate-corporate-jargon-phrase
      description: Generate a corporate jargon phrase
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: corporate-bullshit-generator-phrases.getcorporatephrase
      outputParameters:
      - type: object
        mapping: $.
