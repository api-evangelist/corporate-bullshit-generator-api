aid: corporate-bullshit-generator-api
name: Corporate Bullshit Generator API
x-type: company
description: >-
  The Corporate Bullshit Generator API is a free public REST API that returns
  randomly-generated corporate jargon phrases as JSON. Each request returns a
  single buzzword-laden phrase suitable for placeholder text, parody content,
  test fixtures, or comic relief in mock dashboards. The API is unauthenticated
  and returns a single phrase property in the JSON response body.
